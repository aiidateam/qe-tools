name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Hatch
        run: pip install hatch

      - name: Run pre-commit
        run: hatch run pre-commit:run --all-files

  commit-msgs:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Check commit message format
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          while IFS= read -r subject; do
            msg=$(mktemp)
            printf '%s\n' "$subject" > "$msg"
            if ! python dev/check_commit_msg.py "$msg"; then
              fail=1
            fi
            rm -f "$msg"
          done < <(git log --format=%s "$base..$head")
          exit $fail

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.14']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install hatch
      - run: hatch test --cover

      - name: Install coverage
        if: '!cancelled()'
        run: pip install coverage[toml]

      - name: Coverage summary
        if: '!cancelled()'
        run: |
          echo '## Test Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage XML
        if: '!cancelled()'
        run: coverage xml || true

      - name: Upload coverage to Codecov
        if: '!cancelled()'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
